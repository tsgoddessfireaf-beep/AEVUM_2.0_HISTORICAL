name: Drafting Scribe (Architecture Updater)

on:
  push:
    branches:
      - main

jobs:
  update-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need last commit log

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Drafting Scribe
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/drafting-scribe.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ARCHITECTURE.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto-update ARCHITECTURE.md [skip ci]"
            git push
          else
            echo "No architectural changes detected."
          fi
