name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Client tests ────────────────────────────────────────────────────────
  test-client:
    name: Client tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm test

  # ── Server tests ────────────────────────────────────────────────────────
  test-server:
    name: Server tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci
      - run: npm test

  # ── Build gate (requires both test jobs to pass) ─────────────────────────
  build:
    name: Client build
    runs-on: ubuntu-latest
    needs: [test-client, test-server]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Firebase client config — safe to expose (see firestore.rules for actual auth)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_PRACTITIONER_EMAILS: ${{ secrets.VITE_PRACTITIONER_EMAILS }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # If secrets are absent, Firebase is disabled and the build still succeeds

  # ── Deploy to Firebase (main branch only, after all checks pass) ──────────
  # Auth: Workload Identity Federation — no key file, no long-lived secret.
  # GitHub's OIDC token is exchanged for short-lived Google credentials via
  # the github-actions-pool / github-provider set up in GCP. Scoped to only
  # this repo (tsgoddessfireaf-beep/AEVUM_2.0_HISTORICAL) via attribute-condition.
  # NOTE: functions/index.js binds the RESEND_API_KEY secret. Already set in
  # Secret Manager — nothing to do here unless it's rotated.
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [test-client, test-server, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: firebase-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build production client
        working-directory: client
        run: |
          npm ci
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_PRACTITIONER_EMAILS: ${{ secrets.VITE_PRACTITIONER_EMAILS }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      # Firebase analyzes each functions codebase's SOURCE at deploy time, which
      # requires firebase-functions to be installed in that codebase's node_modules.
      # The client build above only installs client deps, so without this step the
      # deploy fails with "Couldn't find firebase-functions package in your source
      # code." Both codebases in firebase.json (default = functions/, plus
      # bibliotheca_astrologica_horaria/functions) need their deps present.
      # bibliotheca uses `npm install` (not ci) because its package.json deps were
      # realigned (firebase-functions ^7→^6, firebase-admin ^13.6→^13.10) and its
      # lockfile may not be regenerated yet — npm ci would hard-fail on that skew.
      - name: Install functions dependencies
        run: |
          npm ci --prefix functions
          npm install --prefix bibliotheca_astrologica_horaria/functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/720107337435/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: github-action-1272176989@flutter-ai-playground-f880c.iam.gserviceaccount.com

      - name: Deploy hosting, functions, rules & indexes
        run: >
          npx firebase-tools deploy
          --only hosting,functions,firestore,storage
          --project flutter-ai-playground-f880c
          --non-interactive --force

